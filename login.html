<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css">
    <title>Login</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&display=swap');

        :root {
            --color-bg: #FDFBF8;
            --color-bg-soft: #FBF3EE;
            --color-primary: #6B7FA3;
            --color-accent: #E8A7A0;
            --color-text: #2C2C2C;
            --color-text-soft: #5A5A54;
            --color-border: #EBE1D6;
            --color-white: #FFFFFF;
            --font-heading: 'Fraunces', Georgia, serif;
            --font-body: 'Inter', -apple-system, sans-serif;
            --space-sm: 1rem;
            --space-md: 1.75rem;
            --space-lg: 3rem;
            --space-xl: 5rem;
            --radius: 16px;
        }

        * { 
            box-sizing: border-box; 
        }

        body {
            margin: 0;
            font-family: var(--font-body);
            background: var(--color-bg);
            color: var(--color-text);
            font-size: 18px;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* --- Login Navbar Layout (Perfect Right Margin Spacing) --- */
        .login-navbar-row {
            display: flex !important;
            align-items: center !important;
            justify-content: space-between !important;
            background: var(--color-white) !important;
            border-bottom: 1px solid var(--color-border);
            padding: 0 4.5rem !important; /* Matches look of login page screenshot edges */
            height: 80px !important;
        }

        .logo, #logo-img, .logo #logo-img img {
            height: 44px !important;
            max-height: 44px !important;
            width: auto !important;
        }

        nav {
            display: flex !important;
            align-items: center !important;
            gap: 2rem;
        }

        nav a {
            color: var(--color-text) !important;
            font-family: var(--font-body);
            font-weight: 500;
            font-size: 1.25rem;
            text-decoration: none;
        }

            display: flex;
