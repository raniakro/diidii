<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css">
    <link rel="stylesheet" href="styleH.css">


    <div class="w3-top">
        <div class="profile-badge" id="profileBadge">Logged in as <span id="usernameDisplay"></span></div>
        <div class="w3-row w3-padding w3-purple">  
              <div class = "logo"> 
                  <div id = "logo-img">
                      <img src = "logo_square-removebg-preview copy.png">
                  </div>
              </div>
          <nav>
              <a href="help.html">Help</a>
              <a href="conect.html">Upload</a>
              <a href="memories.html">Memories</a>
              <a href="login.html">Login</a>
              <a href="index.html">Home</a>
          </nav>
        </div>
        
    </div>

    <title>Login</title>
    
<body>
    <div id="navbar"></div>

    <div class="content-area">
        <div class="wrapper">
            <h2>Login</h2>
            <form id="loginForm">
                <label for="username">Username:</label>
                <input type="text" id="username" name="username" required>
                <br>
                <label for="password">Password:</label>
                <input type="password" id="password" name="password" required>
                <br>
                <button type="submit">Login</button>
                <button type="button" id="signupBtn" style="background-color: #4CAF50;">Sign Up</button>
            </form>
        </div>
    </div>

    <footer>
        &copy; 2024 Diidii App. All rights reserved.
    </footer>

    <script>
        // Include the navbar
        fetch('navbar.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('navbar').innerHTML = data;

                // Check if the user is logged in and display the profile badge
                fetch('/check-login')
                    .then(response => response.json())
                    .then(data => {
                        if (data.loggedIn) {
                            document.getElementById('usernameDisplay').textContent = data.username;
                            document.getElementById('profileBadge').style.display = 'block';
                        }
                    });
            });

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            const response = await fetch('/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ username, password })
            });

            if (response.ok) {
                alert('Login successful!');
                window.location.href = 'index.html';
            } else {
                alert('Login failed. Please check your username and password.');
            }
        });

        // Add this to your existing script
        document.getElementById('signupBtn').addEventListener('click', async () => {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            if (!username || !password) {
                alert('Please enter both username and password');
                return;
            }

            const response = await fetch('/signup', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ username, password })
            });

            if (response.ok) {
                alert('Sign up successful! Please login.');
                document.getElementById('loginForm').reset();
            } else {
                const error = await response.text();
                alert(error);
            }
        });
    </script>
</body>
</html>
