<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <title>Help Center - diidii</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&display=swap');

        :root {
            --color-bg: #FDFBF8;
            --color-bg-soft: #FBF3EE;
            --color-primary: #6B7FA3;
            --color-accent: #E8A7A0;
            --color-accent-2: #E8C97A;
            --color-text: #2C2C2C;
            --color-text-soft: #5A5A54;
            --color-border: #EBE1D6;
            --color-white: #FFFFFF;
            --font-heading: 'Fraunces', Georgia, serif;
            --font-body: 'Inter', -apple-system, sans-serif;
            --space-sm: 1rem;
            --space-md: 1.75rem;
            --space-lg: 3rem;
            --space-xl: 5rem;
            --radius: 16px;
        }

        * { 
            box-sizing: border-box; 
        }

        body {
            margin: 0;
            font-family: var(--font-body);
            background: var(--color-bg);
            color: var(--color-text);
            font-size: 18px;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* --- Navbar Layout --- */
        .login-navbar-row {
            display: flex !important;
            align-items: center !important;
            justify-content: space-between !important;
            background: var(--color-white) !important;
            border-bottom: 1px solid var(--color-border);
            padding: 0 4.5rem !important;
            height: 80px !important;
        }

          .logo, #logo-img, .logo #logo-img img {
            height: 154px !important;
            max-height: 154px !important;
            width: auto !important;
        }
        nav {
            display: flex !important;
            align-items: center !important;
            gap: 2rem;
        }

        nav a {
            color: var(--color-text) !important;
            font-family: var(--font-body);
            font-weight: 500;
            font-size: 1.25rem;
            text-decoration: none;
            border-bottom: 2px solid transparent;
            padding: 0.25rem 0;
            transition: border-color 0.2s ease;
        }

        nav a:hover {
            border-bottom-color: var(--color-accent);
        }

        /* --- Page Wrapper Canvas Layout --- */
        .page-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            margin-top: 80px; /* Offset for fixed top navbar */
            background: radial-gradient(ellipse 60% 80% at 15% 20%, rgba(216, 180, 222, 0.4), transparent 60%), 
                        radial-gradient(ellipse 55% 75% at 85% 30%, rgba(174, 198, 232, 0.35), transparent 60%), 
                        var(--color-bg);
        }

        .container {
            max-width: 800px;
            width: 100%;
            margin: 0 auto;
            padding: var(--space-xl) var(--space-sm);
        }

        /* --- Content Layout Area --- */
        .section {
            background-color: var(--color-white);
            border: 1px solid var(--color-border);
            padding: var(--space-lg);
            margin-bottom: var(--space-md);
            border-radius: var(--radius);
            box-shadow: 0 4px 15px rgba(44, 44, 44, 0.03);
            text-align: left;
        }

        .section h2 {
            font-family: var(--font-heading);
            color: var(--color-text);
            margin-top: 0;
            margin-bottom: var(--space-md);
            font-size: 2rem;
            font-weight: 500;
        }

        .section h3 {
            font-family: var(--font-heading);
            color: var(--color-primary);
            margin-top: 0;
            margin-bottom: var(--space-sm);
            font-size: 1.75rem;
            font-weight: 500;
        }

        ol {
            padding-left: 1.25rem;
            margin: 0;
        }

        li {
            font-family: var(--font-body);
            font-size: 1.1rem;
            color: var(--color-text-soft);
            padding: var(--space-xs) 0;
        }

        .tutorial { 
            background-color: var(--color-bg-soft);
            padding: var(--space-sm) var(--space-md);
            border-left: 4px solid var(--color-accent);
            font-size: 0.95rem;
            color: var(--color-text-soft);
            border-radius: 0 8px 8px 0;
            line-height: 1.6;
            margin-bottom: var(--space-md);
        }

        /* --- Action Container Controls --- */
        .help-actions {
            display: flex;
            flex-wrap: wrap;
            gap: var(--space-sm);
            margin-top: var(--space-md);
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-family: var(--font-body);
            font-weight: 500;
            padding: 0.85rem 1.5rem;
            font-size: 1.1rem;
            text-decoration: none !important;
            border-radius: 8px;
            cursor: pointer;
            transition: opacity 0.2s ease, transform 0.1s ease;
            flex: 1 1 180px;
            text-align: center;
        }

        .btn-primary { 
            background-color: var(--color-primary); 
            color: var(--color-white) !important; 
        }

        .btn:hover { 
            opacity: 0.9; 
        }
        
        .btn:active { 
            transform: scale(0.99); 
        }

        /* --- Footer --- */
        footer { 
            text-align: center; 
            padding: var(--space-md); 
            background: var(--color-white); 
            border-top: 1px solid var(--color-border); 
            font-size: 0.9rem; 
            color: var(--color-text-soft); 
            margin-top: auto;
        }

        @media (max-width: 640px) {
            .login-navbar-row {
                padding: 0 1.5rem !important;
                flex-direction: column;
                height: auto !important;
                padding-top: 1rem !important;
                padding-bottom: 1rem !important;
                gap: 1rem;
            }
            .page-wrapper {
                margin-top: 140px;
            }
            nav {
                gap: 1rem;
                flex-wrap: wrap;
                justify-content: center;
            }
            nav a {
                font-size: 1.1rem;
            }
            .help-actions {
                flex-direction: column;
            }
            .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>

    <div class="w3-top">
        <div class="profile-badge" id="profileBadge" style="display: none;">Logged in as <span id="usernameDisplay"></span></div>
        <div class="w3-row w3-padding w3-white login-navbar-row">  
            <div class="logo"> 
                <div id="logo-img">
                    <img src="logo_square-removebg-preview copy.png" alt="diidii logo">
                </div>
            </div>
            <nav>
                <a href="help.html">Help</a>
                <a href="conect.html">Upload</a>
                <a href="memories.html">Memories</a>
                <a href="login.html">Login</a>
                <a href="index.html">Home</a>
            </nav>
        </div>
    </div>

    <div class="page-wrapper">
        <div class="container">

            <div class="section">
                <div class="tutorial">
                    <h3>Help Center</h3>
                    <ol>
                        <li>Find answers to your questions about using diidii.</li>
                        <li>Browse the topics below to learn more about each feature.</li>
                    </ol>
                </div>
            </div>

            <div class="section">
                <h2>Topics</h2>
                <div class="help-actions">
                    <a href="imagehelp.html" class="btn btn-primary">Uploading Images</a>
                    <a href="conect.html" class="btn btn-primary">Recording audio</a>
                </div>
            </div>

        </div>

        <footer>
            &copy; 2024 Diidii App. All rights reserved.
        </footer>
    </div>

    <script>
        async function checkLoginState() {
            try {
                const response = await fetch('/check-login');
                if (response.ok) {
                    const data = await response.json();
                    if (data.loggedIn) {
                        document.getElementById('usernameDisplay').textContent = data.username;
                        document.getElementById('profileBadge').style.display = 'block';
                    }
                }
            } catch (err) {
                console.log("Local standalone server mode running.");
            }
        }
        checkLoginState();
    </script>
</body>
</html>
