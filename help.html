            <head>
<style>
        @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&display=swap');

        :root {
            --color-bg: #FDFBF8;
            --color-bg-soft: #FBF3EE;
            --color-primary: #6B7FA3;
            --color-accent: #E8A7A0;
            --color-accent-2: #E8C97A;
            --color-text: #2C2C2C;
            --color-text-soft: #5A5A54;
            --color-border: #EBE1D6;
            --color-white: #FFFFFF;
            --font-heading: 'Fraunces', Georgia, serif;
            --font-body: 'Inter', -apple-system, sans-serif;
            --space-sm: 1rem;
            --space-md: 1.75rem;
            --space-lg: 3rem;
            --space-xl: 5rem;
            --radius: 16px;
        }

        * { 
            box-sizing: border-box; 
        }

        body {
            margin: 0;
            font-family: var(--font-body);
            background: var(--color-bg);
            color: var(--color-text);
            font-size: 18px;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* --- Navbar Layout --- */
        .login-navbar-row {
            display: flex !important;
            align-items: center !important;
            justify-content: space-between !important;
            background: var(--color-white) !important;
            border-bottom: 1px solid var(--color-border);
            padding: 0 4.5rem !important;
            height: 80px !important;
        }

        .logo, #logo-img, .logo #logo-img img {
            height: 44px !important;
            max-height: 44px !important;
            width: auto !important;
        }

        nav {
            display: flex !important;
            align-items: center !important;
            gap: 2rem;
        }

        nav a {
            color: var(--color-text) !important;
            font-family: var(--font-body);
            font-weight: 500;
            font-size: 1.25rem;
            text-decoration: none;
            border-bottom: 2px solid transparent;
            padding: 0.25rem 0;
            transition: border-color 0.2s ease;
        }

        nav a:hover {
            border-bottom-color: var(--color-accent);
        }

        /* --- Page Wrapper Canvas Layout --- */
        .page-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            margin-top: 80px; /* Offset for fixed top navbar */
        }

        /* --- Banner Area --- */
        .banner-area {
            background: radial-gradient(ellipse 60% 80% at 15% 20%, rgba(216, 180, 222, 0.4), transparent 60%), 
                        radial-gradient(ellipse 55% 75% at 85% 30%, rgba(174, 198, 232, 0.35), transparent 60%), 
                        var(--color-bg);
            padding: var(--space-xl) var(--space-md);
            text-align: center;
        }

        .banner-area h2 {
            font-family: var(--font-heading);
            font-weight: 500;
            font-size: clamp(2rem, 5vw, 3rem);
            color: var(--color-text);
            margin: 0;
        }

        /* --- Content Layout Area --- */
        .content-area {
            max-width: 960px;
            width: 100%;
            margin: 0 auto;
            padding: var(--space-xl) var(--space-md);
            text-align: center;
        }

        .content-area h2 {
            font-family: var(--font-heading);
            font-weight: 500;
            font-size: clamp(1.5rem, 3.5vw, 2.25rem);
            color: var(--color-primary);
            margin-top: 0;
            margin-bottom: var(--space-xl);
        }

        /* --- Compact Home Media Grid Rows --- */
        .row {
            display: flex;
            flex-wrap: wrap;
            gap: var(--space-md);
            justify-content: center;
            margin-top: var(--space-md);
        }

        .column {
            flex: 1 1 200px;
            max-width: 240px;
            background: var(--color-white);
            border: 1px solid var(--color-border);
            border-radius: var(--radius);
            padding: var(--space-lg) var(--space-md);
            box-shadow: 0 4px 15px rgba(44, 44, 44, 0.04);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* Constrains image icons to fit inside cards properly */
        .column img {
            width: 80px !important;
            height: 80px !important;
            object-fit: contain;
            border-radius: 0px;
            margin: 0 auto;
        }

        /* --- Feature Highlights --- */
        .picture-area {
            background: var(--color-bg-soft);
            padding: var(--space-xl) var(--space-md);
        }

        .picture-area .wrapper {
            max-width: 780px;
            margin: 0 auto;
            display: grid;
            gap: var(--space-lg);
            text-align: left;
        }

        .picture-area h4 {
            font-family: var(--font-heading);
            font-weight: 600;
            font-size: 1.4rem;
            color: var(--color-text);
            margin: 0 0 var(--space-xs);
            padding-left: var(--space-sm);
            border-left: 4px solid var(--color-accent);
        }

        .picture-area .wrapper > div:nth-child(2) h4 {
            border-left-color: var(--color-primary);
        }

        .picture-area .wrapper > div:nth-child(3) h4 {
            border-left-color: var(--color-accent-2);
        }

        .picture-area p {
            font-family: var(--font-body);
            font-size: 1.05rem;
            color: var(--color-text-soft);
            margin: 0;
            padding-left: var(--space-sm);
        }

        /* --- Call to Action Container --- */
        .background-area {
            background: radial-gradient(ellipse 60% 90% at 80% 10%, rgba(210, 170, 220, 0.25), transparent 60%),
                        radial-gradient(ellipse 55% 80% at 10% 90%, rgba(160, 190, 230, 0.2), transparent 60%),
                        var(--color-bg-soft);
            padding: var(--space-xl) var(--space-md);
            text-align: center;
        }

        .background-area .wrapper {
            max-width: 700px;
            margin: 0 auto;
        }

        .background-area h1 {
            font-family: var(--font-heading);
            font-weight: 500;
            font-size: clamp(1.75rem, 4vw, 2.5rem);
            margin: 0 0 var(--space-sm);
            color: var(--color-text);
        }

        .background-area h2 {
            font-family: var(--font-heading);
            font-weight: 500;
            font-size: 1.5rem;
            color: var(--color-primary);
            margin: var(--space-lg) 0 var(--space-xs);
        }

        .background-area p {
            font-family: var(--font-body);
            font-size: 1.05rem;
            color: var(--color-text-soft);
            margin: 0 0 var(--space-sm);
            line-height: 1.7;
        }

        /* --- Footer --- */
        footer { 
            text-align: center; 
            padding: var(--space-md); 
            background: var(--color-white); 
            border-top: 1px solid var(--color-border); 
            font-size: 0.9rem; 
            color: var(--color-text-soft); 
        }

        @media (max-width: 640px) {
            .login-navbar-row {
                padding: 0 1.5rem !important;
                flex-direction: column;
                height: auto !important;
                padding-top: 1rem !important;
                padding-bottom: 1rem !important;
                gap: 1rem;
            }
            .page-wrapper {
                margin-top: 140px;
            }
            nav {
                gap: 1rem;
                flex-wrap: wrap;
                justify-content: center;
            }
            nav a {
                font-size: 1.1rem;
            }
        }
    </style>
</head>

        <script>
            // Include the navbar
            fetch('navbar.html')
                .then(response => response.text())
                .then(data => {
                    document.getElementById('navbar').innerHTML = data;
    
                    // Check if the user is logged in and display the profile badge
                    fetch('/check-login')
                        .then(response => response.json())
                        .then(data => {
                            if (data.loggedIn) {
                                document.getElementById('usernameDisplay').textContent = data.username;
                                document.getElementById('profileBadge').style.display = 'block';
                            }
                        });
                });
        </script>
